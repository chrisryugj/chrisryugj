<svg width="860" height="260" viewBox="0 0 860 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="딴짓하는 류주임 — Public servant by day, MCP builder by night">
  <defs>
    <style>
      .ko   { font-family: 'Apple SD Gothic Neo','Pretendard','Malgun Gothic',sans-serif; }
      .mono { font-family: ui-monospace,'SF Mono','Menlo','Consolas',monospace; }
      .lat  { font-family: 'Helvetica Neue','Inter',Arial,sans-serif; }
    </style>
  </defs>

  <!-- ink paper -->
  <rect x="0" y="0" width="860" height="260" fill="#0D0D0D"/>
  <rect x="0.5" y="0.5" width="859" height="259" fill="none" stroke="#3A3A38" stroke-width="1"/>

  <!-- top meta row -->
