  <text x="820" y="46" text-anchor="end" class="mono" font-size="12" letter-spacing="2" fill="#7A756C">github.com/chrisryugj</text>
  <line x1="40" y1="60" x2="820" y2="60" stroke="#F5F2EA" stroke-width="1" opacity="0.85"/>

  <!-- index number -->
  <text x="40" y="150" class="mono" font-size="16" fill="#E5533B">01</text>

  <!-- headline -->
  <text x="78" y="152" class="ko" font-size="52" font-weight="800" fill="#F5F2EA" letter-spacing="-1">딴짓하는 류주임</text>

  <!-- accent underline -->
  <line x1="78" y1="168" x2="430" y2="168" stroke="#E5533B" stroke-width="3"/>

  <!-- subline -->
  <text x="78" y="196" class="lat" font-size="17" fill="#C9C4BA">Public servant by day<tspan fill="#E5533B">.</tspan>  MCP builder by night<tspan fill="#E5533B">.</tspan></text>

  <!-- bottom hairline + tags -->
  <line x1="40" y1="218" x2="820" y2="218" stroke="#F5F2EA" stroke-width="1" opacity="0.18"/>
  <text x="40" y="240" class="mono" font-size="11.5" letter-spacing="1.5" fill="#7A756C">KOREAN PUBLIC-DATA MCP&#160;&#160;·&#160;&#160;HWP PARSING&#160;&#160;·&#160;&#160;AI LEGAL SEARCH&#160;&#160;·&#160;&#160;CLAUDE CODE</text>
